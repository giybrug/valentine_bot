<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебя ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden; touch-action: manipulation;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 40px 20px; width: 85%; max-width: 400px;
            text-align: center; z-index: 10;
            transform: translateY(20px); opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn { to { transform: translateY(0); opacity: 1; } }

        /* Контейнер для аватарки и поцелуйчика */
        .avatar-container {
            position: relative;
            display: none; /* Скрыто, пока не подгрузится из бота */
            margin: 0 auto 15px auto;
            width: 100px; height: 100px;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid #ff4d6d;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            object-fit: cover;
        }

        /* Анимация поцелуйчика */
        .kiss {
            position: absolute;
            bottom: -5px; right: -10px;
            font-size: 35px;
            animation: kissPulse 1.5s infinite alternate ease-in-out;
            z-index: 10;
        }

        @keyframes kissPulse {
            0% { transform: scale(1) rotate(-10deg); opacity: 0.8; }
            100% { transform: scale(1.2) rotate(15deg); opacity: 1; }
        }

        h1 { color: #ff4d6d; font-size: 26px; margin-bottom: 15px; }

        /* Стиль для текста */
        .message {
            color: #590d22; font-size: 18px; line-height: 1.6;
            margin-bottom: 30px; display: none; text-align: left;
            min-height: 100px; /* Чтобы карточка не прыгала при печати */
        }
        
        /* Мигающий курсор при печати */
        .cursor {
            display: inline-block; width: 2px; height: 18px;
            background-color: #590d22; vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f); color: white;
            border: none; padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            outline: none; -webkit-tap-highlight-color: transparent;
            animation: pulse-animation 2s infinite;
        }
        .btn:active { transform: scale(0.95); }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        .heart {
            position: absolute; bottom: -10vh; font-size: 24px;
            animation: floatUp 4s linear infinite; z-index: 1; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="card">
        
        <div class="avatar-container" id="avatarContainer">
            <img id="userAvatar" class="avatar" src="" alt="Аватарка">
            <div class="kiss">💋</div>
        </div>

        <h1 id="greeting">С Днём Святого Валентина! ❤️</h1>
        
        <button class="btn" id="revealBtn" onclick="startSurprise()">Нажми меня</button>

        <div class="message" id="secretMessage">
            <span id="textTarget"></span><span class="cursor" id="cursor"></span>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || "Солнце";
        document.getElementById('greeting').innerText = `Для тебя, ${firstName}! ❤️`;

        // Ловим аватарку
        const urlParams = new URLSearchParams(window.location.search);
        const avatarUrl = urlParams.get('avatar');

        if (avatarUrl) {
            document.getElementById('avatarContainer').style.display = 'inline-block';
            document.getElementById('userAvatar').src = decodeURIComponent(avatarUrl);
        }

        // Текст, который будет печататься (можешь изменить на свой!)
        const textToType = "Даже когда мы общаемся только через экран, ты делаешь мой мир ярче. Расстояние — это просто баг, который мы обязательно пофиксим! 😉\n\nБезумно тебя люблю!";
        let charIndex = 0;

        // Эффект печатной машинки
        function typeWriter() {
            if (charIndex < textToType.length) {
                const char = textToType.charAt(charIndex);
                // Если это перенос строки, добавляем тег <br>
                if (char === '\n') {
                    document.getElementById('textTarget').innerHTML += '<br>';
                } else {
                    document.getElementById('textTarget').innerHTML += char;
                }
                charIndex++;
                setTimeout(typeWriter, 50); // Скорость печати (в миллисекундах)
            } else {
                // Прячем курсор, когда текст дописан
                document.getElementById('cursor').style.display = 'none';
            }
        }

        function startSurprise() {
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('secretMessage').style.display = 'block';
            
            // Запускаем печать текста
            typeWriter();
            // Запускаем взрыв сердечек
            createHeartBurst();
        }

        function createBackgroundHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '💕', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        setInterval(createBackgroundHeart, 400);

        function createHeartBurst() {
            for(let i = 0; i < 30; i++) {
                setTimeout(createBackgroundHeart, i * 50);
            }
        }
    </script>
</body>
</html>
