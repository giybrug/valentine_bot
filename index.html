<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Для тебя ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff4d6d;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            margin: 0 auto 15px auto;
            display: none; /* Скрыта, пока не загрузится */
            object-fit: cover;
        }

        /* Контейнер с эффектом стекла (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 40px 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            color: #ff4d6d;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .message {
            color: #590d22;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            display: none; /* Скрыто до нажатия кнопки */
        }

        .btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 77, 109, 0.4);
        }

        /* Пульсация кнопки */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        /* Анимация летающих сердечек */
        .heart {
            position: absolute;
            bottom: -10vh;
            font-size: 24px;
            animation: floatUp 4s linear infinite;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="card">
        <img id="userAvatar" class="avatar" src="" alt="Твоя аватарка">
        <h1 id="greeting">С Днём Святого Валентина! ❤️</h1>
        
        <button class="btn pulse" id="revealBtn" onclick="revealMessage()">Нажми меня</button>

        <div class="message" id="secretMessage">
            Даже когда мы общаемся только через экран, ты делаешь мой мир ярче. Расстояние — это просто баг, который мы обязательно пофиксим! 😉 <br><br>
            <strong>Безумно тебя люблю!</strong>
        </div>
    </div>

    <script>
    // Инициализируем Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем окно на весь экран
    
    // Получаем имя пользователя
    const user = tg.initDataUnsafe?.user;
    const firstName = user?.first_name || "Солнце";
    
    // Меняем заголовок, подставляя имя
    document.getElementById('greeting').innerText = `Для тебя, ${firstName}! ❤️`;

    // Ловим аватарку из ссылки
    const urlParams = new URLSearchParams(window.location.search);
    const avatarUrl = urlParams.get('avatar');

    // Если аватарка передана, показываем её
    if (avatarUrl) {
        const avatarImg = document.getElementById('userAvatar');
        avatarImg.src = decodeURIComponent(avatarUrl);
        avatarImg.style.display = 'block';
    }

    // --- Дальше идет ваш старый код анимаций ---
    function revealMessage() {
        const btn = document.getElementById('revealBtn');
        const msg = document.getElementById('secretMessage');
        btn.style.display = 'none';
        msg.style.display = 'block';
        createHeartBurst();
    }

    function createBackgroundHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = ['❤️', '💖', '💕', '✨'][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
        heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
        document.body.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 6000);
    }

    setInterval(createBackgroundHeart, 400);

    function createHeartBurst() {
        for(let i = 0; i < 30; i++) {
            setTimeout(createBackgroundHeart, i * 50);
        }
    }
</script>

</body>
</html>
