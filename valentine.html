
    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Для тебя ❤️</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #ffeef8;
                font-family: 'Arial', sans-serif;
                overflow: hidden;
                text-align: center;
            }
            .card {
                background: white;
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                z-index: 10;
                max-width: 80%;
            }
            h1 { color: #ff4d6d; font-size: 24px; }
            p { color: #555; line-height: 1.6; }
            .heart-btn {
                background: #ff4d6d;
                color: white;
                border: none;
                padding: 15px 30px;
                border-radius: 50px;
                font-size: 18px;
                cursor: pointer;
                margin-top: 20px;
                transition: transform 0.2s;
            }
            .heart-btn:active { transform: scale(0.9); }
            
            .heart {
                position: absolute;
                color: #ff4d6d;
                font-size: 20px;
                user-select: none;
                pointer-events: none;
                animation: moveUp 4s linear infinite;
            }
            @keyframes moveUp {
                0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
                100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
            }
        </style>
    </head>
    <body>

    <div class="card">
        <h1>С праздником, Любимая!) ❤️</h1>
        <p>Ты самая важная строчка кода в моей жизни<br>Надеюсь эта небольшая открыточка принесет тебе немного теплых эмоций</p>
        <button class="heart-btn" onclick="addHeart()">Нажми меня!</button>
    </div>

    <script>
        function addHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 4000);
        }

        // Создаем начальные сердечки
        setInterval(addHeart, 500);
    </script>
    </body>
    </html>
